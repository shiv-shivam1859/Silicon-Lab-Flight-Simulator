<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silicon Lab - Aerospace Simulator</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow: hidden; height: 100vh; width: 100vw; margin: 0; display: flex; flex-direction: column; }
        @media (min-width: 1024px) { body { flex-direction: row; } }
        
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        #canvas-container { flex-grow: 1; position: relative; background-color: #020617; overflow: hidden; min-height: 50vh; }
        #gl-canvas { display: block; outline: none; width: 100%; height: 100%; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 0.75rem; backdrop-filter: blur(10px); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        input[type=range] { height: 2px; border-radius: 1px; background: rgba(255,255,255,0.1); appearance: none; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #fff; border: 2px solid #0ea5e9; }

        .modern-select { appearance: none; background-color: transparent; }
        .modern-select option { background-color: #1e293b; color: #f8fafc; }
        
        input[type="color"] { -webkit-appearance: none; appearance: none; border: none; width: 20px; height: 20px; padding: 0; cursor: pointer; background: transparent; border-radius: 4px; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <aside class="w-full lg:w-[400px] border-b lg:border-b-0 lg:border-r border-white/5 bg-slate-950 flex flex-col z-50 relative shadow-2xl shrink-0 h-[50vh] lg:h-full">
        
        <div class="px-6 pt-6 pb-4 shrink-0 flex items-center gap-3 border-b border-white/5">
            <div class="p-1.5 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg shadow-[0_0_15px_rgba(59,130,246,0.4)] flex items-center justify-center">
                <img src="Silicon Logo.png" alt="Logo" class="w-6 h-6 object-contain drop-shadow-md">
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tight text-white leading-none">SILICON <span class="text-blue-500">LAB</span></h1>
                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.2em] mt-1">Sim Core v1.2.0</p>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-6 pt-4 custom-scrollbar space-y-5">
            
            <section class="glass-panel p-4 space-y-4">
                <div class="flex justify-between items-center border-b border-white/5 pb-3">
                    <label class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.15em]">Airframe & Geometry</label>
                </div>
                <div class="grid grid-cols-2 gap-x-6 gap-y-4">
                    <div class="flex flex-col gap-1.5"><div class="flex justify-between items-center text-[9px] font-bold text-slate-500 uppercase tracking-wider"><span>Length (cm)</span><span id="v-bodyLen" class="text-cyan-400 mono">40</span></div><input type="range" id="i-bodyLen" min="10" max="100" value="40" class="w-full" oninput="updateAll()"></div>
                    <div class="flex flex-col gap-1.5"><div class="flex justify-between items-center text-[9px] font-bold text-slate-500 uppercase tracking-wider"><span>Dia (mm)</span><span id="v-bodyDia" class="text-cyan-400 mono">24.8</span></div><input type="range" id="i-bodyDia" min="10" max="100" value="24.8" step="0.1" class="w-full" oninput="updateAll()"></div>
                </div>
                <div class="grid grid-cols-2 gap-x-6 gap-y-4 pt-2 border-t border-white/5">
                    <div class="col-span-2 flex flex-col gap-1.5">
                        <select id="i-noseType" class="modern-select w-full bg-slate-900/50 border border-white/10 rounded-md p-2 text-xs text-white" onchange="updateAll()">
                            <option value="ogive">Tangent Ogive Nose</option><option value="conical">Conical Nose</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-x-6 gap-y-4 pt-2 border-t border-white/5">
                    <div class="col-span-2 flex flex-col gap-1.5"><div class="flex justify-between items-center text-[9px] font-bold text-slate-500 uppercase tracking-wider"><span>Fin Count</span><span id="v-finNum" class="text-cyan-400 mono">3</span></div><input type="range" id="i-finNum" min="3" max="6" value="3" step="1" class="w-full" oninput="updateAll()"></div>
                    <div class="flex flex-col gap-1.5"><div class="flex justify-between items-center text-[9px] font-bold text-slate-500 uppercase tracking-wider"><span>Fin Span (cm)</span><span id="v-finSpan" class="text-cyan-400 mono">2.5</span></div><input type="range" id="i-finSpan" min="1" max="15" value="2.5" step="0.1" class="w-full" oninput="updateAll()"></div>
                </div>
            </section>

            <section class="glass-panel p-4 space-y-4 border border-blue-500/20 bg-blue-900/10">
                <div class="flex justify-between items-center border-b border-blue-500/20 pb-3">
                    <label class="text-[10px] font-bold text-blue-300 uppercase tracking-[0.15em]">Propulsion Model</label>
                    <i data-lucide="flame" class="w-4 h-4 text-orange-500"></i>
                </div>
                <div class="col-span-2 flex flex-col gap-1.5">
                    <select id="i-motor" class="modern-select w-full bg-slate-900/80 border border-blue-500/30 rounded-md p-2 text-xs text-white" onchange="updateMotorSpecs()">
                        <option value="C6">Estes C6 (10 Ns)</option>
                        <option value="F15">Estes F15 (50 Ns)</option>
                        <option value="G80">AeroTech G80 (120 Ns)</option>
                    </select>
                </div>
                <div class="grid grid-cols-3 gap-2 mt-2">
                    <div class="bg-slate-900/50 p-2 rounded flex flex-col items-center"><span class="text-[8px] text-slate-500 uppercase">Avg Thrust</span><span id="spec-thrust" class="text-xs text-white mono font-bold">14.6 N</span></div>
                    <div class="bg-slate-900/50 p-2 rounded flex flex-col items-center"><span class="text-[8px] text-slate-500 uppercase">Burn Time</span><span id="spec-burn" class="text-xs text-white mono font-bold">3.4 s</span></div>
                    <div class="bg-slate-900/50 p-2 rounded flex flex-col items-center"><span class="text-[8px] text-slate-500 uppercase">Propellant</span><span id="spec-mass" class="text-xs text-white mono font-bold">30 g</span></div>
                </div>
                <button onclick="launchRocket()" class="w-full mt-2 py-3 bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-400 hover:to-red-500 rounded-lg text-xs font-black uppercase tracking-[0.2em] text-white shadow-[0_0_15px_rgba(239,68,68,0.4)] transition-all active:scale-95">
                    Ignite Engine
                </button>
            </section>
        </div>
    </aside>

    <main id="canvas-container">
        
        <div class="absolute top-6 left-6 z-40 glass-panel p-4 shadow-xl flex items-center gap-6">
            <div class="flex flex-col">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Stability Margin</span>
                <span id="hud-margin" class="text-2xl font-black mono text-emerald-400">1.50<span class="text-sm text-slate-500 ml-1">cal</span></span>
            </div>
            <div class="w-px h-8 bg-white/10"></div>
            <div class="flex flex-col gap-1">
                <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-blue-500"></div><span class="text-[10px] text-slate-300 mono">CG: <span id="hud-cg">0.0</span> cm</span></div>
                <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-red-500"></div><span class="text-[10px] text-slate-300 mono">CP: <span id="hud-cp">0.0</span> cm</span></div>
            </div>
        </div>

        <div id="flight-hud" class="absolute bottom-6 left-1/2 -translate-x-1/2 z-50 glass-panel p-4 shadow-2xl flex items-center gap-8 border-t border-orange-500/30 opacity-0 transition-opacity duration-500">
            <div class="flex flex-col items-center">
                <span class="text-[9px] font-bold text-orange-400 uppercase tracking-wider">Time (T+)</span>
                <span id="tele-time" class="text-xl font-black mono text-white">0.00<span class="text-xs text-slate-500 ml-1">s</span></span>
            </div>
            <div class="w-px h-8 bg-white/10"></div>
            <div class="flex flex-col items-center">
                <span class="text-[9px] font-bold text-cyan-400 uppercase tracking-wider">Altitude</span>
                <span id="tele-alt" class="text-xl font-black mono text-white">0.0<span class="text-xs text-slate-500 ml-1">m</span></span>
            </div>
            <div class="w-px h-8 bg-white/10"></div>
            <div class="flex flex-col items-center">
                <span class="text-[9px] font-bold text-red-400 uppercase tracking-wider">Velocity</span>
                <span id="tele-vel" class="text-xl font-black mono text-white">0.0<span class="text-xs text-slate-500 ml-1">m/s</span></span>
            </div>
        </div>

        <canvas id="gl-canvas"></canvas>
    </main>

    <script>
        // Data Models
        let design = { bodyLen: 40, bodyDia: 24.8, noseType: 'ogive', noseLen: 10, finNum: 3, finRoot: 5, finTip: 2, finSpan: 2.5, finSweep: 1.5, cBody: '#e2e8f0', cNose: '#ef4444', cFins: '#ef4444' };
        let mathData = { COM: 0, COP: 0, Margin: 0, dryMass: 0.150 }; // Added base dry mass
        
        // Motor Database
        const motors = {
            "C6": { thrust: 6.0, burnTime: 1.6, propMass: 0.012, totalMass: 0.024 },
            "F15": { thrust: 14.6, burnTime: 3.4, propMass: 0.030, totalMass: 0.104 },
            "G80": { thrust: 65.0, burnTime: 1.8, propMass: 0.065, totalMass: 0.130 }
        };
        let activeMotor = motors["C6"];
        
        // Graphics Variables
        let scene, camera, renderer, rocketGroup, controls;
        let comMarker, copMarker;
        
        // Simulation Variables
        let isSimulating = false;
        let simTime = 0, simAlt = 0, simVel = 0;
        let lastFrameTime = 0;

        function initThree() {
            const container = document.getElementById('canvas-container'), canvas = document.getElementById('gl-canvas');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x020617);
            camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 20000);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.6)); 
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5); dirLight.position.set(20, 100, 20); scene.add(dirLight);
            scene.add(new THREE.GridHelper(500, 100, 0x1e293b, 0x0f172a));
            
            controls = new THREE.OrbitControls(camera, renderer.domElement); 
            controls.enableDamping = true; controls.maxPolarAngle = Math.PI / 2 + 0.1;
            
            rocketGroup = new THREE.Group(); scene.add(rocketGroup);
            
            const markerGeo = new THREE.SphereGeometry(1, 16, 16);
            comMarker = new THREE.Mesh(markerGeo, new THREE.MeshBasicMaterial({color: 0x3b82f6})); scene.add(comMarker);
            copMarker = new THREE.Mesh(markerGeo, new THREE.MeshBasicMaterial({color: 0xef4444})); scene.add(copMarker);

            window.addEventListener('resize', () => { 
                camera.aspect = container.clientWidth / container.clientHeight; 
                camera.updateProjectionMatrix(); 
                renderer.setSize(container.clientWidth, container.clientHeight); 
            });
            
            updateMotorSpecs();
            updateAll();
            camera.position.set(30, 20, 30); controls.target.set(0, 20, 0); controls.update();
            requestAnimationFrame(physicsLoop);
        }

        function updateMotorSpecs() {
            const selection = document.getElementById('i-motor').value;
            activeMotor = motors[selection];
            document.getElementById('spec-thrust').innerText = activeMotor.thrust.toFixed(1) + " N";
            document.getElementById('spec-burn').innerText = activeMotor.burnTime.toFixed(1) + " s";
            document.getElementById('spec-mass').innerText = (activeMotor.propMass * 1000).toFixed(0) + " g";
        }

        function runMathEngine() {
            const d = design.bodyDia / 10; 
            const massNose = design.noseLen * 0.5;
            const massBody = design.bodyLen * 1.0;
            const massFins = (design.finRoot * design.finSpan * 0.5) * design.finNum * 0.8;
            
            const cgNose = design.noseLen * 0.5;
            const cgBody = design.noseLen + (design.bodyLen / 2);
            const cgFins = design.noseLen + design.bodyLen - (design.finRoot / 2);
            
            mathData.COM = (massNose*cgNose + massBody*cgBody + massFins*cgFins) / (massNose + massBody + massFins);

            const CNN = 2.0;
            let XN = design.noseType === 'conical' ? 0.666 * design.noseLen : 0.466 * design.noseLen;

            const Lf = Math.sqrt(Math.pow(design.finSweep, 2) + Math.pow(design.finSpan, 2));
            const CNF = (4 * design.finNum * Math.pow(design.finSpan/d, 2)) / (1 + Math.sqrt(1 + Math.pow(2*Lf / (design.finRoot + design.finTip), 2)));
            
            const XF_local = (design.finSweep/3) * (design.finRoot + 2*design.finTip)/(design.finRoot + design.finTip) + (1/6) * (Math.pow(design.finRoot,2) + Math.pow(design.finTip,2) + design.finRoot*design.finTip)/(design.finRoot + design.finTip);
            const XF = design.noseLen + design.bodyLen - design.finRoot + XF_local;

            mathData.COP = (CNN * XN + CNF * XF) / (CNN + CNF);
            mathData.Margin = (mathData.COP - mathData.COM) / d;

            document.getElementById('hud-cg').innerText = mathData.COM.toFixed(1);
            document.getElementById('hud-cp').innerText = mathData.COP.toFixed(1);
            const marginEl = document.getElementById('hud-margin');
            marginEl.innerText = mathData.Margin.toFixed(2);
            
            if(mathData.Margin < 1.0) marginEl.className = "text-2xl font-black mono text-red-500";
            else if(mathData.Margin > 3.0) marginEl.className = "text-2xl font-black mono text-amber-500";
            else marginEl.className = "text-2xl font-black mono text-emerald-400";
        }

        function rebuildRocketMesh() {
            while(rocketGroup.children.length > 0) rocketGroup.remove(rocketGroup.children[0]); 
            
            const R = (design.bodyDia / 10) / 2; const L = design.bodyLen;
            const mB = new THREE.MeshStandardMaterial({ color: design.cBody, roughness: 0.3, metalness: 0.4 });
            const mN = new THREE.MeshStandardMaterial({ color: design.cNose, roughness: 0.3, metalness: 0.2 });
            const mF = new THREE.MeshStandardMaterial({ color: design.cFins, roughness: 0.5, metalness: 0.1 });
            
            const tube = new THREE.Mesh(new THREE.CylinderGeometry(R, R, L, 32), mB);
            tube.position.y = L/2; rocketGroup.add(tube);
            
            const pts = [];
            for (let i = 0; i <= 32; i++) {
                const t = i / 32; const y = t * design.noseLen; let x;
                if (design.noseType === 'conical') x = R * (1 - t);
                else x = R * Math.sqrt(1 - Math.pow(t, 2));
                pts.push(new THREE.Vector2(x, y));
            }
            const nose = new THREE.Mesh(new THREE.LatheGeometry(pts, 32), mN); 
            nose.position.y = L; rocketGroup.add(nose);
            
            const fS = new THREE.Shape(); 
            fS.moveTo(0, 0); fS.lineTo(design.finSpan, design.finSweep); fS.lineTo(design.finSpan, design.finSweep + design.finTip); fS.lineTo(0, design.finRoot); fS.lineTo(0, 0);
            const fG = new THREE.ExtrudeGeometry(fS, { depth: 0.3, bevelEnabled: false }); 
            fG.translate(R - 0.05, 0, -0.15); 
            
            for(let i=0; i<design.finNum; i++) { 
                const fin = new THREE.Mesh(fG, mF); fin.rotation.y = (i * Math.PI * 2) / design.finNum; rocketGroup.add(fin); 
            }

            const totalLen = design.bodyLen + design.noseLen;
            const markerScale = R * 1.5;
            comMarker.scale.set(markerScale, markerScale, markerScale);
            copMarker.scale.set(markerScale, markerScale, markerScale);
            comMarker.position.set(rocketGroup.position.x, rocketGroup.position.y + totalLen - mathData.COM, rocketGroup.position.z);
            copMarker.position.set(rocketGroup.position.x, rocketGroup.position.y + totalLen - mathData.COP, rocketGroup.position.z);
        }

        function updateAll() { 
            if(isSimulating) return; // Don't allow edits during flight
            ['bodyLen', 'bodyDia', 'finNum', 'finSpan'].forEach(k => {
                design[k] = parseFloat(document.getElementById(`i-${k}`).value);
                document.getElementById(`v-${k}`).innerText = design[k];
            });
            design.noseType = document.getElementById('i-noseType').value;
            runMathEngine(); 
            rebuildRocketMesh(); 
        }

        // NEW: Physics Simulation Engine (Euler Integration)
        function launchRocket() {
            if (isSimulating) return;
            
            document.getElementById('flight-hud').style.opacity = '1';
            isSimulating = true;
            simTime = 0; simAlt = 0; simVel = 0;
            lastFrameTime = performance.now();
            rocketGroup.position.y = 0;
        }

        function physicsLoop(currentTime) {
            requestAnimationFrame(physicsLoop);
            controls.update();
            renderer.render(scene, camera);

            if (!isSimulating) return;

            const dt = (currentTime - lastFrameTime) / 1000; // Delta time in seconds
            lastFrameTime = currentTime;
            simTime += dt;

            // Mass Depletion Math
            let currentPropMass = activeMotor.propMass;
            let currentThrust = 0;

            if (simTime < activeMotor.burnTime) {
                currentThrust = activeMotor.thrust;
                currentPropMass = activeMotor.propMass * (1 - (simTime / activeMotor.burnTime));
            } else {
                currentPropMass = 0;
            }

            const currentTotalMass = mathData.dryMass + activeMotor.totalMass - activeMotor.propMass + currentPropMass;

            // Simple 1D Aerodynamic Drag (Cd approx 0.6)
            const area = Math.PI * Math.pow((design.bodyDia/1000)/2, 2); 
            const drag = 0.5 * 1.225 * Math.pow(simVel, 2) * 0.6 * area;
            const dragForce = simVel > 0 ? drag : -drag;

            // F = ma
            const gravityForce = currentTotalMass * 9.81;
            const netForce = currentThrust - gravityForce - dragForce;
            const acceleration = netForce / currentTotalMass;

            // Kinematic Integration
            simVel += acceleration * dt;
            simAlt += simVel * dt;

            // Apogee Check / Ground Collision
            if (simAlt <= 0 && simTime > 0.5) {
                simAlt = 0;
                simVel = 0;
                isSimulating = false;
                setTimeout(() => document.getElementById('flight-hud').style.opacity = '0', 3000);
            }

            // Update UI & 3D Model
            document.getElementById('tele-time').innerText = simTime.toFixed(2);
            document.getElementById('tele-alt').innerText = simAlt.toFixed(1);
            document.getElementById('tele-vel').innerText = simVel.toFixed(1);
            
            // Move camera and rocket
            rocketGroup.position.y = simAlt * 0.1; // Scale down for visual
            camera.position.y = rocketGroup.position.y + 20;
            controls.target.y = rocketGroup.position.y + 10;
            
            // Keep markers synced
            const totalLen = design.bodyLen + design.noseLen;
            comMarker.position.set(0, rocketGroup.position.y + (totalLen/10) - (mathData.COM/10), 0);
            copMarker.position.set(0, rocketGroup.position.y + (totalLen/10) - (mathData.COP/10), 0);
        }
        
        window.onload = () => { lucide.createIcons(); initThree(); };
    </script>
</body>
</html>
